<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wedding Menu Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="menu-card">

        <h1>💍 Wedding Celebration</h1>
        <h2>Grand Feast Menu</h2>

        <button id="themeToggle" class="theme-btn">Toggle Theme</button>

        <!-- Starters -->
        <div class="section">
            <h3>🥗 Starters</h3>
            <div class="menu-items">
                
                <div class="item">
                    <h4>Paneer Tikka</h4>
                    <img src="https://orders.popskitchen.in/storage/2024/09/image-358.png" alt="Paneer Tikka" height="200px" width="200px">
                </div>

                <div class="item">
                    <h4>Veg Spring Roll</h4>
                    <img src="https://hot-thai-kitchen.com/wp-content/uploads/2021/03/veggie-spring-rolls-blog.jpg" alt="Veg Spring Roll">
                </div>

                <div class="item">
                    <h4>Hara Bhara Kabab</h4>
                    <img src="https://www.vegrecipesofindia.com/wp-content/uploads/2013/01/hara-bhara-kabab-recipe-1-500x500.jpg" alt="Hara Bhara Kabab">
                </div>

            </div>
        </div>

        <!-- Main Course -->
        <div class="section">
            <h3>🍛 Main Course</h3>
            <div class="menu-items">

                <div class="item">
                    <h4>Shahi Paneer</h4>
                    <img src="https://recipesblob.oetker.in/assets/6c0ac2f3ce204d3d9bb1df9709fc06c9/1272x764/shahi-paneer.webp" alt="Shahi Paneer">
                </div>

                <div class="item">
                    <h4>Dal Makhani</h4>
                    <img src="Assets/dal makhni.webp" alt="Dal Makhani">
                </div>

                <div class="item">
                    <h4>Veg Biryani</h4>
                    <img src="Assets/veg biryani.jpg" alt="Veg Biryani">
                </div>

                <div class="item">
                    <h4>Tandoori Roti / Naan</h4>
                    <img src="Assets/tandoori roti.webp" alt="Tandoori Roti">
                </div>

            </div>
        </div>

        <!-- Desserts -->
        <div class="section">
            <h3>🍨 Desserts</h3>
            <div class="menu-items">

                <div class="item">
                    <h4>Gulab Jamun</h4>
                    <img src="Assets/gulab jamun.jpeg" alt="Gulab Jamun">
                </div>

                <div class="item">
                    <h4>Rasmalai</h4>
                    <img src="Assets/rasmalai.jpg" alt="Rasmalai">
                </div>

                <div class="item">
                    <h4>Ice Cream</h4>
                    <img src="Assets/ice cream.jpg" alt="Ice Cream">
                </div>

            </div>
        </div>

        <p class="footer">❤️ Thank You for Being Part of Our Special Day ❤️</p>

    </div>

    <script src="script.js"></script>
</body>
</html>
